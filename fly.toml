# Fly.io deployment config for the unified calendar.
# Mirrors the outlook sorter's pattern: persistent volume holds the `claude` CLI's
# OAuth credentials so the app uses the user's Pro/Max subscription quota for free.

app = "jonathan-calendar"
primary_region = "yyz" # Toronto

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  timeout = "10s"
  path = "/login"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Persistent volume for the `claude` CLI's OAuth credentials.
# After first deploy run:
#   fly ssh console -C "claude login"
# and follow the URL. Tokens land in /app/.claude and survive restarts.
[[mounts]]
  source = "calendar_data"
  destination = "/app/.claude"
