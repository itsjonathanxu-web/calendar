# fly.toml app configuration file generated for jonathan-calendar on 2026-05-07T10:19:03-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'jonathan-calendar'
primary_region = 'yyz'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATABASE_URL = 'file:/app/data/dev.db'
  HOME = '/app/data'
  NODE_ENV = 'production'

[[mounts]]
  source = 'calendar_data'
  destination = '/app/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '120s'
    method = 'GET'
    path = '/login'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
