# Fly.io deployment config for the unified calendar.
# Single mounted volume holds:
#   • the SQLite database at /app/data/dev.db
#   • the `claude` CLI's OAuth credentials at /app/data/.claude
# Both survive restarts, redeploys, and machine moves.

app = "jonathan-calendar"
primary_region = "yyz" # Toronto

[build]
  dockerfile = "Dockerfile"

[env]
  # SQLite file lives on the mounted volume
  DATABASE_URL = "file:/app/data/dev.db"
  # Force ~/.claude to resolve under the volume so OAuth tokens persist
  HOME = "/app/data"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  timeout = "10s"
  path = "/login"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# After the first deploy, run once to authenticate the CLI:
#   fly ssh console -C "claude login"
# Tokens land in /app/data/.claude (because HOME=/app/data).
[[mounts]]
  source = "calendar_data"
  destination = "/app/data"
